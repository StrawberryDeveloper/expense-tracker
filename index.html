<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>expense-tracker</title>
    <link href="/src/style.css" rel="stylesheet">
  </head>

  <body>
    
    <header class="text-center my-12 max-w-xl mx-auto px-4">
      <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-gray-900 mb-3">
          Expense<span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">Tracker</span>
      </h1>
      
      <p class="text-base md:text-lg font-medium text-gray-500 tracking-wide max-w-md mx-auto">
          Fast-track your financial freedom.
      </p>
    </header>

    <div class="max-w-md mx-auto px-4 mb-8">
      <div class="bg-gradient-to-r from-slate-900 to-slate-800 text-white p-6 rounded-2xl shadow-md text-center border border-slate-700">
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-1">Gesamtkosten monatlich</p>
        <p class="text-4xl font-black tracking-tight"><span id="total-price">0.00</span>€</p>
      </div>
    </div>

    <div id="abo-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 p-4">
    </div>

    <form id="abo-form" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 max-w-md mx-auto space-y-5">
    
    <h2 class="text-xl font-bold text-gray-800 tracking-tight mb-2">Neues Abo hinzufügen</h2>

    <div>
        <label for="abo-name" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
            Abo Name
        </label>
        <input 
            type="text" 
            required 
            id="abo-name" 
            placeholder="z.B. Spotify, Netflix..." 
            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-100 transition duration-150"
        >
    </div>

    <div>
        <label for="abo-price" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
            Monatlicher Preis (€)
        </label>
        <div class="relative">
            <input 
                type="number" 
                required 
                id="abo-price" 
                step="0.01" 
                placeholder="14.99" 
                class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-100 transition duration-150"
            >
        </div>
    </div>

    <button 
        type="submit" 
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-sm hover:shadow transition duration-150 cursor-pointer flex justify-center items-center gap-2"
    >
        <span>Abo hinzufügen</span>
    </button>
</form>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
